services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: miracle-institute-app
    container_name: miracle-institute-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Jakarta}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-miracle_institute}
      DB_USERNAME: ${DB_USERNAME:-miracle}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD", "cgi-fcgi", "-bind", "-connect", "127.0.0.1:9000"]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    image: miracle-institute-nginx
    container_name: miracle-institute-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8082}:80"
    volumes:
      - app-storage:/var/www/html/storage:ro

  queue-worker:
    image: miracle-institute-app
    container_name: miracle-institute-queue-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Jakarta}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-miracle_institute}
      DB_USERNAME: ${DB_USERNAME:-miracle}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
    command: php artisan queue:work database --queue=emails,default --sleep=3 --tries=3 --timeout=120

  scheduler:
    image: miracle-institute-app
    container_name: miracle-institute-scheduler
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Jakarta}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-miracle_institute}
      DB_USERNAME: ${DB_USERNAME:-miracle}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
    volumes:
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
    command: /bin/sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"

  db:
    image: mysql:8.0
    container_name: miracle-institute-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-miracle_institute}
      MYSQL_USER: ${DB_USERNAME:-miracle}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-root-password}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-change-root-password}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
  app-storage:
  app-cache:
