services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: miracle-institute-app
    container_name: miracle-institute-app-dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      VITE_SERVER_HOST: vite
      VITE_SERVER_PORT: 5173
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: miracle_institute
      DB_USERNAME: miracle
      DB_PASSWORD: miracle2512
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    depends_on:
      - db
      - vite
    volumes:
      - .:/var/www/html
      - app-storage:/var/www/html/storage
      - app-cache:/var/www/html/bootstrap/cache
      - /var/www/html/node_modules
    command: php artisan serve --host=0.0.0.0 --port=8000

  vite:
    build:
      context: .
      dockerfile: Dockerfile.vite
    image: miracle-institute-vite
    container_name: miracle-institute-vite-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: 5173
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev

  db:
    image: mysql:8.0
    container_name: miracle-institute-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: miracle_institute
      MYSQL_USER: miracle
      MYSQL_PASSWORD: miracle2512
      MYSQL_ROOT_PASSWORD: miracle2512
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pmiracle2512"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: miracle-institute-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M

volumes:
  db-data:
  app-storage:
  app-cache:
